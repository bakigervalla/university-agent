name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Tests (offline, no live LLM)
        run: pytest --cov=uni_agent --cov-report=term-missing

      - name: Deliverable & secret audit
        run: python scripts/audit_deliverables.py
